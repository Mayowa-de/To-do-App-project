<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-do App</title>
    <link rel="stylesheet" href="./css/Style.css" />
    <link rel="stylesheet" href="./css/responsive.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/cf7036bce7.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <aside>
      <div class="title">
      <h1>Scheduler App</h1>
  </div>

      <nav class="side-bar">
        <ul>
          <li><i class="fa-solid fa-house"></i> Home</li>
          <li><i class="fa-solid fa-list-check"></i> Tasks</li>
          <li><i class="fas fa-line-chart"></i> Progress</li>
          <li><i class="fa-solid fa-user-cog"></i> Preference</li>
          <li><i class="fas fa-gear"></i> Settings</li>
          <li><i class="fa-solid fa-right-from-bracket"></i> Log Out</li>
        </ul>
      </nav>
    </aside>
    <main>
      <div class="content">
        <div class="input-container">
          <input
            type="text"
            class="search-input"
            placeholder="Search tasks by title"
          />
          <i class="fas fa-search" id="search-icon"></i>
        </div>
        <button id="add-button">+ Add Task</button>
      </div>

      <div class="filter-container">
        <button id="all-card" class="filter-btn">All</button>
        <button id="active-card" class="filter-btn">Active</button>
        <button id="completed-card" class="filter-btn">Completed</button>
      </div>

      <!-- container containing cards created -->
      <section id="container"></section>

    </main>
      <footer class="footer-list">
        <div class="curve1"></div>
        <div class="curve2"></div>
        <ul class="list-container">
          <li><i class="fa-solid fa-chart-line"></i> Progress</li>
          <li>Tasks</li>
          <li><i class="fa-solid fa-gear"></i> Settings</li>
        </ul>
      </footer>

    <div id="task-popup" class="popup-overlay hidden">
      <div class="popup-card">
        <h2>Add Task Details</h2>
        <label for="title">
          Title
          <input type="text" id="input" placeholder="Enter a title" />
        </label>
        <label for="due date">
          Due date
          <input id="due-date-input" type="date" />
        </label>
        <label for="level">
          Level
          <select id="level-select">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
        </label>
        <div class="popup-actions">
          <button id="cancel-popup" type="button">Cancel</button>
          <button id="confirm-task" type="button">Add Task</button>
        </div>
      </div>
    </div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
