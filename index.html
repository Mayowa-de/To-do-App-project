<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-do App</title>
    <link rel="stylesheet" href="./css/Style.css" />
    <link rel="stylesheet" href="./css/responsive.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/cf7036bce7.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <main>
      <h1>Task Management App</h1>

      <div class="content">
        <div class="input-container">
        <input type="text" placeholder="Enter task title" />
        <i class="fas fa-search" id="search-icon"></i>
      </div>
        <button id="add-button">+ Add Task</button>
      </div>
      <p id="error-message"></p>
      <section id="container"></section>
    </main>

    <div id="task-popup" class="popup-overlay hidden">
      <div class="popup-card">
        <h2>Add Task Details</h2>
        <label for="title">
          Title
          <input type="text" id="input">
        </label>
        <label for="due date">
          Due date
          <input id="due-date-input" type="date" />
        </label>
        <label for="level">
          Level
          <select id="level-select">
            <option value="easy">Easy</option>
            <option value="hard">Medium</option>
            <option value="hard">Hard</option>
          </select>
        </label>
        <div class="popup-actions">
          <button id="cancel-popup" type="button">Cancel</button>
          <button id="confirm-task" type="button">Add Task</button>
        </div>
      </div>
    </div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
